name: Felix Position Telegram Monitor

on:
  # GitHub Actions 使用 UTC 时间
  # 0,4,8,12,16,20 点 UTC ~= 北京时间 8,12,16,20,0,4 点
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"
  # 方便你手动在 Actions 页面点一次测试
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Felix monitor and send Telegram message
        run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

